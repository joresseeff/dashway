# ──────────────────────────────────────────────────────────────────────────────
# ci.yml — Dashway Continuous Integration
#
# Runs on every push and pull-request:
#   1. lint  — flake8 style checks
#   2. test  — placeholder; extend with pytest when tests are added
#
# Triggered on: push to any branch, all pull-requests
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Linting ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: pip install flake8

      - name: Run flake8
        # E501 (line too long > 79) is relaxed to 120 chars for readability.
        # W503 conflicts with Black formatter — ignored.
        run: flake8 scr/ --statistics
          

  # ── Tests (placeholder) ──────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pygame pytest

      - name: Run tests
        # SDL_VIDEODRIVER=dummy allows Pygame to initialise without a real display.
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          pytest tests/ -v --tb=short || echo "No tests found yet — skipping."
