# docker-compose.yml
# ------------------
# Lance le jeu + l'API ensemble.
#
# Usage:
#   docker compose up --build

services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - HMAC_SECRET=${HMAC_SECRET:-dashway-hmac-secret}
    volumes:
      - api-data:/app/dashway_api.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashway:
    build: .
    depends_on:
      - api
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - DASHWAY_API_URL=http://api:8000
      - HMAC_SECRET=${HMAC_SECRET:-dashway-hmac-secret}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - game-data:/app/dashway.db
    network_mode: host
    restart: "no"

volumes:
  api-data:
  game-data:
